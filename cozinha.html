<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recebimento de pedidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        barlow: ['Barlow', 'sans-serif'],
                    },
                    colors: {
                        primary: '#f9a8d4',
                        dark: '#5b4e7c'
                    }
                }
            }
        }
    </script>
</head>
<body class="font-barlow text-gray-800 bg-gradient-to-br from-rose-50 via-white to-cyan-50 min-h-screen">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto flex items-center justify-between px-6 py-4">
            <div class="flex items-center">
                <img src="./assets/images/deitado.png" alt="Logo" class="w-65 h-40 object-contain">
            </div>
            <div class="flex items-center gap-3">
                <span class="inline-flex items-center gap-2 rounded-full bg-red-100 text-red-700 px-3 py-2 text-sm font-semibold">
                    <span class="h-2 w-2 rounded-full bg-red-500 animate-pulse"></span>
                    Offline
                </span>
                <button id="refreshBtn" class="bg-dark text-white px-5 py-2 rounded-full font-semibold shadow-lg hover:bg-black transition">Atualizar</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10">
        <section class="mb-8">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <p class="text-sm uppercase tracking-[0.3em] text-gray-500">Pedidos Recebidos</p>
                    <h2 class="text-4xl font-black text-dark">Painel da Cozinha</h2>
                </div>
                <div class="inline-flex items-center gap-3 rounded-full bg-white shadow-md px-4 py-3 border border-gray-200">
                    <span class="text-sm text-gray-500">Total</span>
                    <span id="orderCount" class="text-2xl font-black text-dark">0 pedidos</span>
                </div>
            </div>
        </section>

        <section class="grid gap-6">
            <div class="rounded-[30px] border border-rose-200 bg-white/95 p-6 shadow-sm">
                <div class="flex items-start gap-4">
                    <div class="rounded-3xl bg-rose-50 text-rose-700 p-3 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1 4v-4m-1 0V9m0 9a8 8 0 100-16 8 8 0 000 16z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-base font-semibold text-red-700">Ops!</p>
                        <p class="mt-2 text-sm text-gray-600 leading-relaxed">Não foi possível carregar os pedidos da nuvem. Verifique conexão com a API.</p>
                    </div>
                </div>
            </div>

            <div id="ordersContainer" class="grid gap-4">
                <div class="rounded-[30px] border border-dashed border-gray-300 bg-white/80 p-8 text-center text-gray-500">
                    <p class="text-lg font-semibold">Nenhum pedido carregado.</p>
                    <p class="mt-2 text-sm">Clique em Atualizar para tentar novamente.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const orderCount = document.getElementById('orderCount');
        const ordersContainer = document.getElementById('ordersContainer');
        const refreshBtn = document.getElementById('refreshBtn');

        async function carregarPedidos() {
            ordersContainer.innerHTML = '<div class="rounded-[30px] border border-gray-200 bg-white p-10 text-center text-gray-500 shadow-sm">Carregando pedidos...</div>';
            try {
                const response = await fetch('https://vercel-sorveteria.vercel.app/api/pedidos');
                if (!response.ok) throw new Error('Falha na API');
                const pedidos = await response.json();
                renderizarPedidos(pedidos);
            } catch (error) {
                ordersContainer.innerHTML = `
                    <div class="rounded-[30px] border border-rose-200 bg-rose-50 p-8 text-center text-rose-700 shadow-sm">
                        <p class="text-lg font-semibold">Não foi possível carregar os pedidos.</p>
                        <p class="mt-2 text-sm">Verifique sua conexão e tente novamente.</p>
                    </div>
                `;
                orderCount.innerText = '0 pedidos';
            }
        }

        function renderizarPedidos(pedidos) {
            if (!pedidos || pedidos.length === 0) {
                ordersContainer.innerHTML = `
                    <div class="rounded-[30px] border border-dashed border-gray-300 bg-white/80 p-8 text-center text-gray-500">
                        <p class="text-lg font-semibold">Nenhum pedido disponível.</p>
                    </div>
                `;
                orderCount.innerText = '0 pedidos';
                return;
            }
            orderCount.innerText = `${pedidos.length} pedido${pedidos.length > 1 ? 's' : ''}`;
            ordersContainer.innerHTML = pedidos.map(pedido => `
                <article class="rounded-[30px] border border-gray-200 bg-white p-6 shadow-sm">
                    <div class="flex flex-col sm:flex-row sm:justify-between gap-4">
                        <div>
                            <p class="text-sm text-gray-500">Pedido #${pedido.id || 'N/A'}</p>
                            <h3 class="text-xl font-bold text-dark">${pedido.cliente || 'Cliente desconhecido'}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-gray-500">Status</p>
                            <span class="inline-flex rounded-full bg-rose-100 text-rose-700 px-3 py-1 text-sm font-semibold">${pedido.status || 'Pendente'}</span>
                        </div>
                    </div>
                    <div class="mt-4 grid gap-2 sm:grid-cols-3">
                        <div class="rounded-3xl bg-gray-50 p-4">
                            <p class="text-xs uppercase tracking-[0.2em] text-gray-400">Itens</p>
                            <p class="mt-2 font-semibold text-dark">${pedido.itens?.length || 0}</p>
                        </div>
                        <div class="rounded-3xl bg-gray-50 p-4">
                            <p class="text-xs uppercase tracking-[0.2em] text-gray-400">Total</p>
                            <p class="mt-2 font-semibold text-dark">${(pedido.total || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</p>
                        </div>
                        <div class="rounded-3xl bg-gray-50 p-4">
                            <p class="text-xs uppercase tracking-[0.2em] text-gray-400">Entrega</p>
                            <p class="mt-2 font-semibold text-dark">${pedido.endereco || 'Retirar'}</p>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        refreshBtn.addEventListener('click', carregarPedidos);

        carregarPedidos();

    </script>
</body>
</html>
